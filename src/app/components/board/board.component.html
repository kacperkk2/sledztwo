
<div fxLayout="column" fxLayoutAlign="start center" style="height: 100%;">

  <div class="main" fxLayout="column" fxLayoutAlign="center center">

    <!-- WIDOK GŁÓWNY -->
    <ng-container *ngIf="!swapViewCard">

      <div fxFlexFill fxFlex="94" class="board-grid-wrapper">
        <div class="board-grid">
          <div class="board-tile"
              *ngFor="let card of cards"
              (click)="isSwapMode ? enterSwapView(card) : markCard(card)">
            <app-card [card]="card" [showLabel]="isLabelMode" [isMarked]="card.isMarked" [switchMark]="isSwapMode" [zoom]="zoom"></app-card>
          </div>
        </div>
      </div>

      <div class="bottom-nav" fxFlexFill fxFlex="6" fxLayout="row" fxLayoutAlign="space-between center">

        <div fxLayout="row" fxLayoutGap="8px">
          <button mat-flat-button (click)="reloadRandomBoard()">
            <mat-icon>shuffle</mat-icon> Losuj
          </button>
          <button mat-flat-button [color]="isSwapMode ? 'accent' : ''" (click)="swapMode()">
            <mat-icon>swap_horiz</mat-icon> Zmiana karty
          </button>
        </div>

        <div fxLayout="row" fxLayoutGap="8px">
          <button mat-flat-button (click)="zoomOut()" [disabled]="zoom <= 0.9">
            <mat-icon>zoom_out</mat-icon>
          </button>
          <button mat-flat-button (click)="zoomIn()" [disabled]="zoom >= 1.2">
            <mat-icon>zoom_in</mat-icon>
          </button>
          <button mat-flat-button [color]="isLabelMode ? 'accent' : ''" (click)="switchLabels()">
            <mat-icon>text_fields</mat-icon>
          </button>
        </div>

      </div>

    </ng-container>

    <!-- WIDOK EDYCJI WIERSZA -->
    <ng-container *ngIf="swapViewCard">

      <div fxFlexFill fxFlex="94">
        <app-card-swap-view
          [initialCard]="swapViewCard"
          [showLabels]="isLabelMode"
          [zoom]="zoom"
          (swapped)="onSwapped()">
        </app-card-swap-view>
      </div>

      <div class="bottom-nav" fxFlexFill fxFlex="6" fxLayout="row" fxLayoutAlign="space-between center">
        <button mat-flat-button (click)="onBack()">
          <mat-icon>arrow_back</mat-icon> Powrót
        </button>
        <div fxLayout="row" fxLayoutGap="8px">
          <button mat-flat-button (click)="zoomOut()" [disabled]="zoom <= 0.9">
            <mat-icon>zoom_out</mat-icon>
          </button>
          <button mat-flat-button (click)="zoomIn()" [disabled]="zoom >= 1.2">
            <mat-icon>zoom_in</mat-icon>
          </button>
          <button mat-flat-button [color]="isLabelMode ? 'accent' : ''" (click)="switchLabels()">
            <mat-icon>text_fields</mat-icon>
          </button>
        </div>
      </div>

    </ng-container>

  </div>

</div>
