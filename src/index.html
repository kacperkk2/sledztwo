</head>
<script>
  // Stable viewport height — iOS dvh can change between renders
  function setAppHeight() {
    document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
  }
  window.addEventListener('resize', setAppHeight);
  setAppHeight();

  // Prevent iOS pull-to-refresh (overscroll-behavior: none not reliable on iOS)
  document.addEventListener('touchmove', function(e) {
    var el = e.target;
    while (el && el !== document.body) {
      var overflow = window.getComputedStyle(el).overflowY;
      if ((overflow === 'auto' || overflow === 'scroll') && el.scrollHeight > el.clientHeight) return;
      el = el.parentElement;
    }
    e.preventDefault();
  }, { passive: false });
</script>

</body>
